<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IQ/OQ/PQ Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @media print{.no-print{display:none !important}#draft-preview{max-height:none !important}}
    #draft-preview table { border-collapse: collapse; width: 100%; }
    #draft-preview th, #draft-preview td { border: 1px solid #334155; padding: 6px; vertical-align: top; }
    #draft-preview h1, #draft-preview h2, #draft-preview h3 { border-bottom: 2px solid #334155; padding-bottom: 4px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <div id="app" class="mx-auto max-w-2xl px-4 py-12">
    <div class="mb-10 no-print">
      <h1 class="text-2xl font-bold text-slate-800">IQ/OQ/PQ Generator</h1>
      <p class="mt-1 text-slate-500">Create advisory qualification packages</p>
    </div>
    <div id="content">Loading...</div>
  </div>
  <script>
    const API = '/api/v1';
    const NAR_CLEANROOM = 'Not in a Cleanroom';
    let state = {
      flowStep: 0,
      cohorts: [],
      hazards: [],
      loading: true,
      error: null,
      expandedHelp: null,
      selectedCohort: '',
      selectedEquipment: null,
      equipmentId: '',
      siteContext: { cleanroomClass: 'ISO 7', utilities: [], productContact: true, productionThroughput: 'Medium' },
      cleanroomNotApplicable: false,
      equipmentControls: {},
      equipmentControlsCatalog: null,
      hazardContextOptions: null,
      hazardRatings: {},
      vmodelCatalog: { urs: [], frs: [], trs: [] },
      vmodelSelection: { ursIds: [], frsIds: [], trsIds: [] },
      catalog: { hazcatVersion: 'hazcat_v1.1', rulesetId: 'ruleset_v1.1' },
      siteContextMetadata: { cleanroomClasses: [], productContact: {}, productionThroughput: [] },
      equipmentMetadata: null,
      generating: false,
      result: null,
      artifactUrls: null,
      lifecycle: {
        vmp: {
          scope: '',
          roles: '',
          timeline: '',
          deliverables: '',
          trainingPlan: '',
          supplierEvidencePlan: '',
        },
        urs: {
          intendedUse: '',
          criticalProcessParameters: '',
          environmentNeeds: '',
          throughputRationale: '',
          acceptanceCriteria: '',
        },
        computerizedValidation: {
          computerized: false,
          softwareClassification: '',
          part11Controls: '',
          dataIntegrityControls: '',
          patchConfigHistory: '',
        },
        requalificationPlan: {
          baseFrequency: 'annual',
          triggers: [],
          rationale: '',
        },
        protocolPreferences: {
          pqRunCount: 3,
          sampleSize: 30,
          evidencePlaceholders: '',
        },
      },
    };

    function getStepList() {
      const steps = [
        { id: 'cohort', label: 'Equipment cohort' },
        { id: 'equipmentType', label: 'Equipment type' },
      ];
      if (!state.selectedEquipment) return steps;
      steps.push({ id: 'utilities', label: 'Utilities' });
      const catalog = state.equipmentControlsCatalog;
      (catalog?.controlCategories || []).forEach((cat, i) => {
        steps.push({ id: 'equipmentControl', idx: i, label: cat.label });
      });
      steps.push({ id: 'vmp', label: 'Validation master plan' });
      steps.push({ id: 'urs', label: 'URS selection' });
      steps.push({ id: 'frs', label: 'FRS selection' });
      steps.push({ id: 'trs', label: 'TRS selection' });
      steps.push({ id: 'protocolPreferences', label: 'Protocol preferences' });
      steps.push({ id: 'computerizedValidation', label: 'Computerized/GxP' });
      steps.push({ id: 'requalification', label: 'Requalification' });
      steps.push({ id: 'throughput', label: 'Production throughput' });
      steps.push({ id: 'productContact', label: 'Product contact' });
      steps.push({ id: 'cleanroom', label: 'Cleanroom class' });
      steps.push({ id: 'review', label: 'Review & Generate Draft' });
      return steps;
    }

    function getCurrentStep() {
      const steps = getStepList();
      const idx = Math.min(state.flowStep, steps.length - 1);
      return steps[idx] || steps[0];
    }

    function nextStep() {
      const steps = getStepList();
      if (state.flowStep < steps.length - 1) state.flowStep++;
      render();
    }

    function prevStep() {
      if (state.flowStep > 0) state.flowStep--;
      render();
    }

    function goToStep(idx) {
      state.flowStep = Math.max(0, Math.min(idx, getStepList().length - 1));
      render();
    }

    async function fetchJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + url);
      return r.json();
    }

    async function load() {
      try {
        const [equip, cat, siteCtx] = await Promise.all([
          fetchJson(API + '/equipment-types'),
          fetchJson(API + '/catalog/version').catch(() => state.catalog),
          fetchJson(API + '/site-context').catch(() => ({ cleanroomClasses: [], productContact: {}, productionThroughput: [] })),
        ]);
        state.cohorts = equip.cohorts || [];
        state.catalog = { ...state.catalog, ...cat };
        state.siteContextMetadata = { cleanroomClasses: siteCtx.cleanroomClasses || [], productContact: siteCtx.productContact || {}, productionThroughput: siteCtx.productionThroughput || [] };
        if (state.siteContextMetadata.cleanroomClasses.length) state.siteContext.cleanroomClass = state.siteContextMetadata.cleanroomClasses.find(c => c.value === 'ISO 7') ? 'ISO 7' : state.siteContextMetadata.cleanroomClasses[0]?.value || 'ISO 7';
        if (state.siteContextMetadata.productionThroughput.length) state.siteContext.productionThroughput = state.siteContextMetadata.productionThroughput.find(t => t.value === 'Medium') ? 'Medium' : state.siteContextMetadata.productionThroughput[0]?.value || 'Medium';
      } catch (e) {
        state.error = e.message;
      }
      state.loading = false;
      render();
    }

    async function loadEquipmentMetadata(equipmentTypeId) {
      try {
        const [metaRes, ctrlRes, ursRes, frsRes, trsRes] = await Promise.all([
          fetchJson(API + '/equipment-metadata?equipmentTypeId=' + equipmentTypeId),
          fetchJson(API + '/equipment-controls?equipmentTypeId=' + equipmentTypeId).catch(() => null),
          fetchJson(API + '/urs-library?equipmentTypeId=' + equipmentTypeId).catch(() => ({ requirements: [] })),
          fetchJson(API + '/frs-library?equipmentTypeId=' + equipmentTypeId).catch(() => ({ functions: [] })),
          fetchJson(API + '/trs-library?equipmentTypeId=' + equipmentTypeId).catch(() => ({ tests: [] })),
        ]);
        state.equipmentMetadata = metaRes;
        const em = metaRes.equipmentMetadata;
        if (em?.defaultUtilities?.length) state.siteContext.utilities = [...em.defaultUtilities];
        else state.siteContext.utilities = state.siteContext.utilities.length ? state.siteContext.utilities : ['Electricity'];
        state.equipmentControlsCatalog = ctrlRes;
        state.vmodelCatalog = {
          urs: ursRes.requirements || [],
          frs: frsRes.functions || [],
          trs: trsRes.tests || [],
        };
        state.vmodelSelection = {
          ursIds: (ursRes.requirements || []).filter(r => r.criticality === 'critical').map(r => r.ursId),
          frsIds: [],
          trsIds: [],
        };
        state.equipmentControls = {};
        (ctrlRes?.controlCategories || []).forEach(cat => {
          (cat.controls || []).forEach(ctrl => {
            if (ctrl.valueType === 'boolean') state.equipmentControls[ctrl.controlId] = false;
            else if (ctrl.valueType === 'choice' && ctrl.options?.length) state.equipmentControls[ctrl.controlId] = '';
          });
        });
      } catch (e) {
        state.equipmentMetadata = null;
        state.equipmentControlsCatalog = null;
        state.vmodelCatalog = { urs: [], frs: [], trs: [] };
        state.vmodelSelection = { ursIds: [], frsIds: [], trsIds: [] };
        state.equipmentControls = {};
        if (!state.siteContext.utilities.length) state.siteContext.utilities = ['Electricity'];
      }
      render();
    }

    function setEquipmentControl(controlId, value) {
      state.equipmentControls[controlId] = value;
      render();
    }

    async function loadHazards() {
      if (!state.selectedEquipment) return;
      state.equipmentMetadata = null;
      await loadEquipmentMetadata(state.selectedEquipment.id);
      const [hazRes, ctxRes] = await Promise.all([
        fetchJson(API + '/hazards?equipmentTypeId=' + state.selectedEquipment.id),
        fetchJson(API + '/hazard-context-options?equipmentTypeId=' + state.selectedEquipment.id).catch(() => ({ hazardContextOptions: [] })),
      ]);
      state.hazards = hazRes.hazards || [];
      state.hazardContextOptions = ctxRes.hazardContextOptions || [];
      state.hazardRatings = {};
      state.hazards.forEach(h => {
        const q = h.quickDefaults || {};
        const ctxForHazard = (state.hazardContextOptions || []).find(ho => ho.hazardId === h.hazardId);
        const hazardContext = {};
        (ctxForHazard?.contextOptions || []).forEach(opt => {
          if (opt.valueType === 'boolean') hazardContext[opt.contextId] = false;
          else if (opt.valueType === 'choice') hazardContext[opt.contextId] = '';
          else if (opt.valueType === 'multiSelect') hazardContext[opt.contextId] = [];
        });
        state.hazardRatings[h.hazardId] = {
          Severity_label: q.defaultSeverity || '',
          ProbabilityOfOccurrence_label: q.defaultProbability || '',
          Exposure_label: q.defaultExposure || '',
          Detectability_label: q.defaultDetectability || '',
          ControlEffectiveness_label: q.defaultControlEffectiveness || '',
          hazardContext,
        };
      });
      render();
    }

    async function selectEquipmentTypeAndNext() {
      if (!state.selectedEquipment) return;
      state.loading = true;
      render();
      await loadEquipmentMetadata(state.selectedEquipment.id);
      state.loading = false;
      state.flowStep = 2;
      render();
    }

    function setHazardContext(hazardId, contextId, value) {
      const r = state.hazardRatings[hazardId] || {};
      if (!r.hazardContext) r.hazardContext = {};
      r.hazardContext[contextId] = value;
      state.hazardRatings[hazardId] = { ...r };
      render();
    }

    function toggleHazardContextMulti(hazardId, contextId, value) {
      const r = state.hazardRatings[hazardId] || {};
      if (!r.hazardContext) r.hazardContext = {};
      const arr = r.hazardContext[contextId] || [];
      const i = arr.indexOf(value);
      if (i >= 0) arr.splice(i, 1);
      else arr.push(value);
      r.hazardContext[contextId] = arr;
      state.hazardRatings[hazardId] = { ...r };
      render();
    }

    function toggleUtility(u) {
      const i = state.siteContext.utilities.indexOf(u);
      if (i >= 0) state.siteContext.utilities = state.siteContext.utilities.filter(x => x !== u);
      else state.siteContext.utilities = [...state.siteContext.utilities, u];
      render();
    }

    function setHazardRating(hazardId, field, value) {
      state.hazardRatings[hazardId] = state.hazardRatings[hazardId] || {};
      state.hazardRatings[hazardId][field] = value;
      render();
    }

    function setRequalTrigger(trigger, checked) {
      const arr = state.lifecycle.requalificationPlan.triggers || [];
      const idx = arr.indexOf(trigger);
      if (checked && idx < 0) arr.push(trigger);
      if (!checked && idx >= 0) arr.splice(idx, 1);
      state.lifecycle.requalificationPlan.triggers = arr;
      render();
    }

    function toggleReq(kind, id, checked) {
      const sel = state.vmodelSelection[kind] || [];
      const idx = sel.indexOf(id);
      if (checked && idx < 0) sel.push(id);
      if (!checked && idx >= 0) sel.splice(idx, 1);
      state.vmodelSelection[kind] = sel;
      if (kind === 'ursIds') {
        const derivedFrs = state.vmodelCatalog.frs
          .filter(f => (f.derivedFromURS || []).some(u => sel.includes(u)))
          .map(f => f.frsId);
        state.vmodelSelection.frsIds = Array.from(new Set([...(state.vmodelSelection.frsIds || []), ...derivedFrs]));
      }
      if (kind === 'frsIds') {
        const derivedTrs = state.vmodelCatalog.trs
          .filter(t => (t.verifiesFRS || []).some(f => (state.vmodelSelection.frsIds || []).includes(f)))
          .map(t => t.trsId);
        state.vmodelSelection.trsIds = Array.from(new Set([...(state.vmodelSelection.trsIds || []), ...derivedTrs]));
      }
      render();
    }

    function toggleHelp(hazardId, field) {
      const key = hazardId + '.' + field;
      state.expandedHelp = state.expandedHelp === key ? null : key;
      render();
    }

    function setCleanroomNotApplicable(checked) {
      state.cleanroomNotApplicable = checked;
      if (checked) state.siteContext.cleanroomClass = NAR_CLEANROOM;
      else state.siteContext.cleanroomClass = state.siteContextMetadata.cleanroomClasses?.find(c => c.value === 'ISO 7')?.value || 'ISO 7';
      render();
    }

    async function downloadDocx() {
      const md = state.result?.markdownContent;
      if (!md) return;
      try {
        const r = await fetch(API + '/draft-docx', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ markdownContent: md }) });
        if (!r.ok) throw new Error('Failed to generate DOCX');
        const blob = await r.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'qualification-draft.docx';
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) {
        state.error = e.message;
        render();
      }
    }

    function canGenerate() {
      if (!state.selectedEquipment || !state.catalog.rulesetId || !state.catalog.hazcatVersion) return false;
      const l = state.lifecycle;
      if (!l.vmp.scope || !l.vmp.roles || !l.vmp.deliverables) return false;
      if (!l.urs.intendedUse || !l.urs.criticalProcessParameters || !l.urs.acceptanceCriteria) return false;
      if (!l.requalificationPlan.rationale || !(l.requalificationPlan.triggers || []).length) return false;
      if (l.computerizedValidation.computerized && !l.computerizedValidation.softwareClassification) return false;
      if (!(state.vmodelSelection.ursIds || []).length) return false;
      if (!(state.vmodelSelection.frsIds || []).length) return false;
      if (!(state.vmodelSelection.trsIds || []).length) return false;
      return true;
    }

    async function handleGenerate() {
      if (!canGenerate() || !state.selectedEquipment) return;
      state.generating = true;
      state.error = null;
      render();
      try {
        const sc = state.siteContext;
        const payload = {
          equipmentId: state.equipmentId || 'E-' + state.selectedEquipment.id + '-001',
          equipmentTypeId: state.selectedEquipment.id,
          cohort: state.selectedCohort,
          type: state.selectedEquipment.name,
          siteContext: {
            ...sc,
            cleanroomClass: state.cleanroomNotApplicable ? NAR_CLEANROOM : sc.cleanroomClass,
          },
          controlArchitecture: 'PLC or SCADA',
          hazards: [],
          rulesetId: state.catalog.rulesetId,
          hazcatVersion: state.catalog.hazcatVersion,
          vmp: state.lifecycle.vmp,
          urs: state.lifecycle.urs,
          computerizedValidation: state.lifecycle.computerizedValidation,
          requalificationPlan: state.lifecycle.requalificationPlan,
          vmodel: {
            ursIds: state.vmodelSelection.ursIds || [],
            frsIds: state.vmodelSelection.frsIds || [],
            trsIds: state.vmodelSelection.trsIds || [],
            protocolPreferences: state.lifecycle.protocolPreferences,
          },
        };
        const ec = state.equipmentControls || {};
        const ecFiltered = Object.keys(ec).reduce((o, k) => {
          const v = ec[k];
          if (v !== '' && v !== false) o[k] = v;
          return o;
        }, {});
        if (Object.keys(ecFiltered).length) payload.equipmentControls = ecFiltered;
        const res = await fetch(API + '/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'HTTP ' + res.status);
        }
        const data = await res.json();
        state.result = data;
        const artRes = await fetch(API + '/artifact?fingerprint=' + encodeURIComponent(data.fingerprint));
        const artData = await artRes.json();
        state.artifactUrls = artData.files || {};
      } catch (e) {
        state.error = e.message;
      }
      state.generating = false;
      render();
    }

    function renderProgressBar() {
      if (state.result) return '';
      const steps = getStepList();
      const total = steps.length;
      const current = Math.min(state.flowStep + 1, total);
      const pct = total > 0 ? (current / total) * 100 : 0;
      return '<div class="mb-8 no-print"><div class="flex justify-between text-xs text-slate-500 mb-1"><span>Step ' + current + ' of ' + total + '</span><span>' + (getCurrentStep().label || '') + '</span></div><div class="h-2 w-full rounded-full bg-slate-200 overflow-hidden"><div class="h-full bg-slate-700 transition-all duration-300 rounded-full" style="width:' + pct + '%"></div></div></div>';
    }

    function renderStepContent() {
      const steps = getStepList();
      if (state.flowStep >= steps.length && !state.result) return '<div class="rounded-xl border border-slate-200 bg-white p-6">Invalid step.</div>';
      const step = getCurrentStep();
      const esc = (s) => String(s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');

      if (step.id === 'cohort') {
        let html = '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="text-lg font-semibold">Equipment cohort</h2><p class="text-sm text-slate-500">Select the equipment category.</p>';
        html += '<div><label class="block text-sm font-medium text-slate-600">Cohort</label><select onchange="state.selectedCohort=this.value;state.selectedEquipment=null;render()" class="mt-2 w-full max-w-md rounded border border-slate-200 px-3 py-2">';
        html += '<option value="">Select cohort...</option>';
        state.cohorts.forEach(co => {
          html += '<option value="'+esc(co.cohortId)+'"'+(state.selectedCohort===co.cohortId?' selected':'')+'>'+co.cohortId+'</option>';
        });
        html += '</select></div>';
        html += '<div class="flex gap-2"><button onclick="prevStep()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300" disabled>Back</button>';
        html += '<button onclick="nextStep()" '+(state.selectedCohort?'':'disabled')+' class="rounded bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700 disabled:opacity-50">Next</button></div></div>';
        return html;
      }

      if (step.id === 'equipmentType') {
        const cohortData = state.cohorts.find(c => c.cohortId === state.selectedCohort);
        const types = cohortData?.equipmentTypes || [];
        let html = '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="text-lg font-semibold">Equipment type</h2><p class="text-sm text-slate-500">Select the equipment type.</p>';
        html += '<div><label class="block text-sm font-medium text-slate-600">Equipment type</label><select onchange="state.selectedEquipment={id:this.value,name:this.options[this.selectedIndex].text};render()" class="mt-2 w-full max-w-md rounded border border-slate-200 px-3 py-2">';
        html += '<option value="">Select equipment...</option>';
        types.forEach(et => {
          html += '<option value="'+esc(et.equipmentTypeId)+'"'+(state.selectedEquipment?.id===et.equipmentTypeId?' selected':'')+'>'+et.equipmentType+'</option>';
        });
        html += '</select></div>';
        html += '<div class="flex gap-2"><button onclick="prevStep()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300">Back</button>';
        html += '<button onclick="selectEquipmentTypeAndNext()" '+(state.selectedEquipment?'':'disabled')+' class="rounded bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700 disabled:opacity-50">'+(state.loading?'Loading...':'Next')+'</button></div></div>';
        return html;
      }

      if (step.id === 'utilities') {
        const em = state.equipmentMetadata?.equipmentMetadata || state.equipmentMetadata;
        const utilList = em?.defaultUtilities?.length ? em.defaultUtilities : ['Steam','Electricity','Compressed Air','WFI','Nitrogen'];
        const utilDesc = em?.utilityDescriptors || {};
        const utilMaster = state.equipmentMetadata?.utilitiesMasterList || {};
        let html = '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="text-lg font-semibold">Utilities</h2><p class="text-sm text-slate-500">Select all utilities that supply this equipment.</p>';
        html += '<div class="flex flex-wrap gap-2">';
        utilList.forEach(u => {
          const checked = state.siteContext.utilities.includes(u);
          const desc = utilDesc[u] || utilMaster[u] || '';
          html += '<label class="flex cursor-pointer items-center gap-2 rounded border px-4 py-2 hover:bg-slate-50 '+(checked?'border-emerald-500 bg-emerald-50/50':'border-slate-200')+'" title="'+desc.replace(/"/g,'&quot;')+'"><input type="checkbox" '+(checked?'checked':'')+' onchange="toggleUtility(\''+esc(u)+'\')"><span class="text-sm">'+u+'</span>';
          if (desc) html += '<span class="text-slate-400 cursor-help">ⓘ</span>';
          html += '</label>';
        });
        html += '</div>';
        html += '<div class="flex gap-2"><button onclick="prevStep()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300">Back</button>';
        html += '<button onclick="nextStep()" class="rounded bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Next</button></div></div>';
        return html;
      }

      if (step.id === 'equipmentControl' && step.idx !== undefined) {
        const catalog = state.equipmentControlsCatalog;
        const cats = catalog?.controlCategories || [];
        const cat = cats[step.idx];
        if (!cat) return '';
        let html = '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="text-lg font-semibold">Equipment controls: '+cat.label+'</h2><p class="text-sm text-slate-500">Select controls that apply to this equipment.</p>';
        (cat.controls || []).forEach(ctrl => {
          const cid = ctrl.controlId; const val = state.equipmentControls[cid];
          if (ctrl.valueType === 'boolean') {
            html += '<label class="flex cursor-pointer items-center gap-3 rounded border border-slate-200 px-3 py-2 hover:bg-slate-50 mb-2"><input type="checkbox" '+(val?'checked':'')+' onchange="setEquipmentControl(\''+esc(cid)+'\',this.checked)"> <span class="text-sm font-medium">'+ctrl.label+'</span></label>';
            if (ctrl.help) html += '<p class="ml-6 mb-3 text-xs text-slate-500">'+esc(ctrl.help).replace(/</g,'&lt;')+'</p>';
          } else if (ctrl.valueType === 'choice' && ctrl.options?.length) {
            html += '<div class="mb-4"><label class="block text-sm font-medium text-slate-600 mb-1">'+ctrl.label+'</label>';
            html += '<select onchange="setEquipmentControl(\''+esc(cid)+'\',this.value)" class="w-full max-w-md rounded border border-slate-200 px-3 py-2">';
            html += '<option value="">Select...</option>';
            ctrl.options.forEach(o => { html += '<option value="'+esc(o.value)+'"'+(val===o.value?' selected':'')+'>'+(o.label||o.value)+'</option>'; });
            html += '</select></div>';
          }
        });
        html += '<div class="flex gap-2"><button onclick="prevStep()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300">Back</button>';
        html += '<button onclick="nextStep()" class="rounded bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Next</button></div></div>';
        return html;
      }

      if (step.id === 'throughput') {
        const opts = state.siteContextMetadata.productionThroughput?.length ? state.siteContextMetadata.productionThroughput : [{value:'Low',label:'Low'},{value:'Medium',label:'Medium'},{value:'High',label:'High'}];
        let html = '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="text-lg font-semibold">Production throughput</h2><p class="text-sm text-slate-500">Select the production throughput level.</p>';
        html += '<select onchange="state.siteContext.productionThroughput=this.value;render()" class="w-full max-w-md rounded border border-slate-200 px-3 py-2">';
        opts.forEach(o => { const v = o.value||o; html += '<option value="'+esc(v)+'"'+(state.siteContext.productionThroughput===v?' selected':'')+'>'+(o.label||o)+'</option>'; });

        html += '<dt class="mt-2 font-medium text-slate-500">URS selected</dt><dd>'+(state.vmodelSelection.ursIds||[]).length+'</dd>';
        html += '<dt class="mt-2 font-medium text-slate-500">FRS selected</dt><dd>'+(state.vmodelSelection.frsIds||[]).length+'</dd>';
        html += '<dt class="mt-2 font-medium text-slate-500">TRS selected</dt><dd>'+(state.vmodelSelection.trsIds||[]).length+'</dd></dl>';
        html += '<div class="rounded border border-slate-200 p-3 text-sm"><div class="font-medium text-slate-600 mb-1">V-model readiness</div><div>VMP/URS/FRS/TRS/Requalification captured: <strong>Yes</strong></div><div>Computerized system flagged: <strong>'+(state.lifecycle.computerizedValidation.computerized?'Yes':'No')+'</strong></div></div>';
        html += '<div class="flex gap-2"><button onclick="prevStep()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300">Back</button>';
        html += '<button onclick="handleGenerate()" '+(canGenerate()&&!state.generating?'':'disabled')+' class="rounded bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700 disabled:opacity-50">'+(state.generating?'Generating...':'Generate Draft')+'</button></div></div>';
        return html;
      }

      return '';
    }

    function render() {
      const c = document.getElementById('content');
      if (state.loading && !state.equipmentMetadata) {
        c.innerHTML = '<div class="flex min-h-[200px] items-center justify-center text-slate-500">Loading...</div>';
        return;
      }

      let html = '';
      if (state.error) html += '<div class="mb-6 rounded-lg bg-red-50 p-4 text-red-700">'+state.error+'</div>';

      if (state.result) {
        const md = state.result.markdownContent || '';
        const draftHtml = typeof marked !== 'undefined' ? marked.parse(md || '_No draft content available._') : (md || '_No draft content available._').replace(/\n/g,'<br>');
        html += '<div class="space-y-6 rounded-xl border border-emerald-200 bg-white p-6 shadow-sm">';
        html += '<h2 class="text-lg font-semibold text-emerald-800 no-print">Draft generated</h2>';
        html += '<div class="flex flex-wrap gap-2 no-print">';
        html += '<button type="button" onclick="window.print()" class="rounded bg-slate-700 px-3 py-1.5 text-sm text-white hover:bg-slate-600">Save as PDF</button>';
        html += '<button type="button" onclick="downloadDocx()" class="rounded bg-slate-700 px-3 py-1.5 text-sm text-white hover:bg-slate-600">Download DOCX</button>';
        html += '</div>';
        const files = state.artifactUrls || {};
        const fileNames = Object.keys(files);
        if (fileNames.length) {
          html += '<div class="rounded border border-slate-200 bg-white p-3 no-print"><div class="mb-2 text-sm font-medium text-slate-700">Generated documents</div><div class="flex flex-wrap gap-2">';
          fileNames.filter(n => n.endsWith('.md') || n.endsWith('.csv') || n.endsWith('.json')).forEach(n => {
            const u = files[n];
            if (typeof u === 'string') html += '<a class="rounded border border-slate-300 px-2 py-1 text-xs hover:bg-slate-50" target="_blank" href="'+u+'">'+n+'</a>';
          });
          html += '</div></div>';
        }
        html += '<div class="rounded-lg border border-slate-200 bg-slate-50 p-6 max-h-[60vh] overflow-y-auto prose prose-slate max-w-none" id="draft-preview">'+draftHtml+'</div>';
        html += '<button onclick="state.flowStep=0;state.result=null;state.artifactUrls=null;state.selectedCohort=\'\';state.selectedEquipment=null;state.hazards=[];state.vmodelCatalog={urs:[],frs:[],trs:[]};state.vmodelSelection={ursIds:[],frsIds:[],trsIds:[]};state.equipmentControlsCatalog=null;state.equipmentMetadata=null;state.lifecycle={vmp:{scope:\'\',roles:\'\',timeline:\'\',deliverables:\'\',trainingPlan:\'\',supplierEvidencePlan:\'\'},urs:{intendedUse:\'\',criticalProcessParameters:\'\',environmentNeeds:\'\',throughputRationale:\'\',acceptanceCriteria:\'\'},computerizedValidation:{computerized:false,softwareClassification:\'\',part11Controls:\'\',dataIntegrityControls:\'\',patchConfigHistory:\'\'},requalificationPlan:{baseFrequency:\'annual\',triggers:[],rationale:\'\'},protocolPreferences:{pqRunCount:3,sampleSize:30,evidencePlaceholders:\'\'}};load();render()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300 no-print">Create another</button></div>';
      } else {
        html += renderProgressBar();
        html += renderStepContent();
      }

      c.innerHTML = html;
    }

    load();
  </script>
</body>
</html>
