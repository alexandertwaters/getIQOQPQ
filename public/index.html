<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>V-Model Qualification Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @media print{.no-print{display:none !important}#draft-preview{max-height:none !important}}
    #draft-preview table { border-collapse: collapse; width: 100%; }
    #draft-preview th, #draft-preview td { border: 1px solid #334155; padding: 6px; vertical-align: top; }
    #draft-preview h1, #draft-preview h2, #draft-preview h3 { border-bottom: 2px solid #334155; padding-bottom: 4px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <div id="app" class="mx-auto max-w-3xl px-4 py-12">
    <div class="mb-10 no-print">
      <h1 class="text-2xl font-bold text-slate-800">V-Model Qualification Generator</h1>
      <p class="mt-1 text-slate-500">Select cohort, equipment type, URS, FRS, and TRS</p>
    </div>
    <div id="content">Loading...</div>
  </div>
  <script>
    const API = '/api/v1';
    const STEPS = [
      { id: 'cohort', label: 'Equipment cohort' },
      { id: 'equipmentType', label: 'Equipment type' },
      { id: 'urs', label: 'URS selection' },
      { id: 'frs', label: 'FRS selection' },
      { id: 'trs', label: 'TRS selection' },
      { id: 'review', label: 'Review & Generate Draft' }
    ];
    let state = {
      flowStep: 0,
      loading: true,
      error: null,
      generating: false,
      result: null,
      artifactUrls: null,
      cohorts: [],
      selectedCohort: '',
      selectedEquipment: null,
      equipmentId: '',
      catalog: { hazcatVersion: 'hazcat_v1.1', rulesetId: 'ruleset_v1.1' },
      vmodelCatalog: { urs: [], frs: [], trs: [] },
      vmodelSelection: { ursIds: [], frsIds: [], trsIds: [] },
      ui: {
        ursQuery: '',
        frsQuery: '',
        trsQuery: '',
        showAdvancedURS: false,
        showAdvancedFRS: false,
        showAdvancedTRS: false
      }
    };

    const esc = (s) => String(s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    const currentStep = () => STEPS[Math.max(0, Math.min(state.flowStep, STEPS.length - 1))];
    const hasId = (arr, id) => (arr || []).includes(id);

    async function fetchJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + url);
      return r.json();
    }

    async function loadBootstrap() {
      try {
        const [equip, cat] = await Promise.all([
          fetchJson(API + '/equipment-types'),
          fetchJson(API + '/catalog/version').catch(() => state.catalog)
        ]);
        state.cohorts = equip.cohorts || [];
        state.catalog = { ...state.catalog, ...cat };
      } catch (e) {
        state.error = e.message;
      }
      state.loading = false;
      render();
    }

    async function loadVModelCatalog(equipmentTypeId) {
      const [ursRes, frsRes, trsRes] = await Promise.all([
        fetchJson(API + '/requirements-library?kind=urs&equipmentTypeId=' + equipmentTypeId).catch(() => ({ requirements: [] })),
        fetchJson(API + '/requirements-library?kind=frs&equipmentTypeId=' + equipmentTypeId).catch(() => ({ functions: [] })),
        fetchJson(API + '/requirements-library?kind=trs&equipmentTypeId=' + equipmentTypeId).catch(() => ({ tests: [] }))
      ]);
      state.vmodelCatalog = {
        urs: ursRes.requirements || [],
        frs: frsRes.functions || [],
        trs: trsRes.tests || []
      };
      const defaultUrs = (state.vmodelCatalog.urs || [])
        .filter(r => r.defaultSelected || r.required || r.criticality === 'critical')
        .map(r => r.ursId);
      state.vmodelSelection = { ursIds: defaultUrs, frsIds: [], trsIds: [] };
      autoDerive();
    }

    function autoDerive() {
      const ursIds = state.vmodelSelection.ursIds || [];
      const frsIds = state.vmodelCatalog.frs
        .filter(f => (f.derivedFromURS || []).some(u => ursIds.includes(u)))
        .map(f => f.frsId);
      state.vmodelSelection.frsIds = Array.from(new Set([...(state.vmodelSelection.frsIds || []), ...frsIds]));

      const selectedFrs = state.vmodelSelection.frsIds || [];
      const trsIds = state.vmodelCatalog.trs
        .filter(t => (t.verifiesFRS || []).some(f => selectedFrs.includes(f)))
        .map(t => t.trsId);
      state.vmodelSelection.trsIds = Array.from(new Set([...(state.vmodelSelection.trsIds || []), ...trsIds]));
    }

    function toggleReq(kind, id, checked) {
      const current = state.vmodelSelection[kind] || [];
      const idx = current.indexOf(id);
      if (checked && idx < 0) current.push(id);
      if (!checked && idx >= 0) current.splice(idx, 1);
      state.vmodelSelection[kind] = [...current];
      if (kind === 'ursIds' || kind === 'frsIds') autoDerive();
      render();
    }

    function canGenerate() {
      if (!state.selectedEquipment || !state.selectedCohort) return false;
      return (state.vmodelSelection.ursIds || []).length > 0
        && (state.vmodelSelection.frsIds || []).length > 0
        && (state.vmodelSelection.trsIds || []).length > 0;
    }

    async function handleGenerate() {
      if (!canGenerate() || !state.selectedEquipment) return;
      state.generating = true;
      state.error = null;
      render();
      try {
        const payload = {
          equipmentId: state.equipmentId || 'E-' + state.selectedEquipment.id + '-001',
          equipmentTypeId: state.selectedEquipment.id,
          cohort: state.selectedCohort,
          type: state.selectedEquipment.name,
          siteContext: { cleanroomClass: 'N/A', utilities: [], productContact: true, productionThroughput: 'Medium' },
          controlArchitecture: 'PLC or SCADA',
          hazards: [],
          rulesetId: state.catalog.rulesetId,
          hazcatVersion: state.catalog.hazcatVersion,
          vmp: {},
          urs: {},
          computerizedValidation: {},
          requalificationPlan: {},
          vmodel: {
            ursIds: state.vmodelSelection.ursIds || [],
            frsIds: state.vmodelSelection.frsIds || [],
            trsIds: state.vmodelSelection.trsIds || [],
            protocolPreferences: {}
          }
        };
        const res = await fetch(API + '/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || ('HTTP ' + res.status));
        }
        const data = await res.json();
        state.result = data;
        const artRes = await fetch(API + '/artifact?fingerprint=' + encodeURIComponent(data.fingerprint));
        const artData = await artRes.json();
        state.artifactUrls = artData.files || {};
      } catch (e) {
        state.error = e.message;
      }
      state.generating = false;
      render();
    }

    async function downloadDocx() {
      const md = state.result?.markdownContent;
      if (!md) return;
      try {
        const r = await fetch(API + '/draft-docx', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ markdownContent: md })
        });
        if (!r.ok) throw new Error('Failed to generate DOCX');
        const blob = await r.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'qualification-draft.docx';
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) {
        state.error = e.message;
        render();
      }
    }

    function filterItems(items, query, showAdvanced) {
      const q = (query || '').toLowerCase().trim();
      let out = items || [];
      if (!showAdvanced) out = out.filter(i => i.required || i.defaultSelected || i.criticality === 'critical' || i.criticality === 'major');
      if (!q) return out;
      return out.filter(i =>
        (i.title || '').toLowerCase().includes(q)
        || (i.statement || i.functionalRequirement || i.objective || '').toLowerCase().includes(q)
        || (i.category || '').toLowerCase().includes(q)
      );
    }

    function renderProgressBar() {
      if (state.result) return '';
      const current = Math.min(state.flowStep + 1, STEPS.length);
      const pct = (current / STEPS.length) * 100;
      return '<div class="mb-8 no-print"><div class="flex justify-between text-xs text-slate-500 mb-1"><span>Step ' + current + ' of ' + STEPS.length + '</span><span>' + currentStep().label + '</span></div><div class="h-2 w-full rounded-full bg-slate-200 overflow-hidden"><div class="h-full bg-slate-700 transition-all duration-300 rounded-full" style="width:' + pct + '%"></div></div></div>';
    }

    function renderRequirementStep(kind, title, description) {
      const cfg = kind === 'urs' ? { key: 'ursIds', id: 'ursId', body: 'statement', query: 'ursQuery', adv: 'showAdvancedURS' }
        : kind === 'frs' ? { key: 'frsIds', id: 'frsId', body: 'functionalRequirement', query: 'frsQuery', adv: 'showAdvancedFRS' }
        : { key: 'trsIds', id: 'trsId', body: 'objective', query: 'trsQuery', adv: 'showAdvancedTRS' };
      const source = state.vmodelCatalog[kind] || [];
      const items = filterItems(source, state.ui[cfg.query], state.ui[cfg.adv]);
      let html = '<div class="space-y-4 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">';
      html += '<h2 class="text-lg font-semibold">' + title + '</h2>';
      html += '<p class="text-sm text-slate-500">' + description + '</p>';
      html += '<div class="flex gap-2">';
      html += '<input type="text" value="' + esc(state.ui[cfg.query]) + '" oninput="state.ui.' + cfg.query + '=this.value;render()" placeholder="Search requirements..." class="w-full max-w-md rounded border border-slate-200 px-3 py-2 text-sm">';
      html += '<label class="inline-flex items-center gap-2 text-sm"><input type="checkbox" ' + (state.ui[cfg.adv] ? 'checked' : '') + ' onchange="state.ui.' + cfg.adv + '=this.checked;render()"> Show advanced</label>';
      html += '</div>';
      html += '<div class="max-h-[45vh] overflow-y-auto rounded border border-slate-200 p-2">';
      if (!items.length) {
        html += '<div class="text-sm text-slate-500">No items match current filters.</div>';
      } else {
        items.forEach(req => {
          const id = req[cfg.id];
          const checked = hasId(state.vmodelSelection[cfg.key], id);
          const tags = (req.regulatoryTags || []).join(', ');
          html += '<label class="mb-1 flex cursor-pointer items-start gap-2 rounded border px-2 py-2 ' + (checked ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200') + '">';
          html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggleReq(\'' + cfg.key + '\',\'' + esc(id) + '\',this.checked)">';
          html += '<span class="text-sm"><strong>' + req.title + '</strong>';
          if (req.category) html += ' <span class="text-xs text-slate-500">(' + req.category + ')</span>';
          html += '<br><span class="text-slate-600">' + (req[cfg.body] || '') + '</span>';
          if (tags) html += '<br><span class="text-xs text-slate-500">Regulatory: ' + tags + '</span>';
          html += '</span></label>';
        });
      }
      html += '</div>';
      html += '<div class="text-xs text-slate-500">Selected: ' + (state.vmodelSelection[cfg.key] || []).length + '</div>';
      html += '<div class="flex gap-2"><button onclick="state.flowStep=Math.max(0,state.flowStep-1);render()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300">Back</button><button onclick="state.flowStep=Math.min(' + (STEPS.length - 1) + ',state.flowStep+1);render()" class="rounded bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Next</button></div>';
      html += '</div>';
      return html;
    }

    function renderStepContent() {
      const step = currentStep();
      if (step.id === 'cohort') {
        let html = '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="text-lg font-semibold">Equipment cohort</h2><p class="text-sm text-slate-500">Select equipment category.</p>';
        html += '<div><label class="block text-sm font-medium text-slate-600">Cohort</label><select onchange="state.selectedCohort=this.value;state.selectedEquipment=null;render()" class="mt-2 w-full max-w-md rounded border border-slate-200 px-3 py-2"><option value="">Select cohort...</option>';
        state.cohorts.forEach(co => html += '<option value="' + esc(co.cohortId) + '"' + (state.selectedCohort === co.cohortId ? ' selected' : '') + '>' + co.cohortId + '</option>');
        html += '</select></div><div class="flex gap-2"><button disabled class="rounded bg-slate-200 px-4 py-2 text-sm font-medium opacity-50">Back</button><button onclick="state.flowStep=1;render()" ' + (state.selectedCohort ? '' : 'disabled') + ' class="rounded bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700 disabled:opacity-50">Next</button></div></div>';
        return html;
      }
      if (step.id === 'equipmentType') {
        const cohortData = state.cohorts.find(c => c.cohortId === state.selectedCohort);
        const types = cohortData?.equipmentTypes || [];
        let html = '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="text-lg font-semibold">Equipment type</h2><p class="text-sm text-slate-500">Select equipment type.</p>';
        html += '<div><label class="block text-sm font-medium text-slate-600">Equipment type</label><select onchange="state.selectedEquipment={id:this.value,name:this.options[this.selectedIndex].text};render()" class="mt-2 w-full max-w-md rounded border border-slate-200 px-3 py-2"><option value="">Select equipment...</option>';
        types.forEach(et => html += '<option value="' + esc(et.equipmentTypeId) + '"' + (state.selectedEquipment?.id === et.equipmentTypeId ? ' selected' : '') + '>' + et.equipmentType + '</option>');
        html += '</select></div>';
        html += '<div class="flex gap-2"><button onclick="state.flowStep=0;render()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300">Back</button><button onclick="(async()=>{if(!state.selectedEquipment)return;state.loading=true;render();await loadVModelCatalog(state.selectedEquipment.id);state.loading=false;state.flowStep=2;render();})()" ' + (state.selectedEquipment ? '' : 'disabled') + ' class="rounded bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700 disabled:opacity-50">' + (state.loading ? 'Loading...' : 'Next') + '</button></div></div>';
        return html;
      }
      if (step.id === 'urs') return renderRequirementStep('urs', 'User Requirements Specification (URS)', 'Select applicable URS items. Default/high-critical items are preselected.');
      if (step.id === 'frs') return renderRequirementStep('frs', 'Functional Requirements Specification (FRS)', 'Review and adjust FRS items auto-derived from URS.');
      if (step.id === 'trs') return renderRequirementStep('trs', 'Technical Requirements Specification (TRS)', 'Select TRS checks used to derive IQ/OQ/PQ protocol content.');
      if (step.id === 'review') {
        let html = '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="text-lg font-semibold">Review & Generate Draft</h2>';
        html += '<div><label class="block text-sm font-medium text-slate-600 mb-1">Equipment ID (optional)</label><input type="text" value="' + esc(state.equipmentId) + '" onchange="state.equipmentId=this.value" placeholder="e.g. E-STER-PV-001" class="w-full max-w-md rounded border border-slate-200 px-3 py-2"></div>';
        html += '<dl class="space-y-1 text-sm"><dt class="font-medium text-slate-500">Cohort</dt><dd>' + state.selectedCohort + '</dd><dt class="mt-2 font-medium text-slate-500">Equipment</dt><dd>' + (state.selectedEquipment?.name || '') + '</dd><dt class="mt-2 font-medium text-slate-500">URS selected</dt><dd>' + state.vmodelSelection.ursIds.length + '</dd><dt class="mt-2 font-medium text-slate-500">FRS selected</dt><dd>' + state.vmodelSelection.frsIds.length + '</dd><dt class="mt-2 font-medium text-slate-500">TRS selected</dt><dd>' + state.vmodelSelection.trsIds.length + '</dd></dl>';
        html += '<div class="flex gap-2"><button onclick="state.flowStep=4;render()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300">Back</button><button onclick="handleGenerate()" ' + (canGenerate() && !state.generating ? '' : 'disabled') + ' class="rounded bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700 disabled:opacity-50">' + (state.generating ? 'Generating...' : 'Generate Draft') + '</button></div></div>';
        return html;
      }
      return '';
    }

    function render() {
      const c = document.getElementById('content');
      if (state.loading && !state.result) {
        c.innerHTML = '<div class="flex min-h-[200px] items-center justify-center text-slate-500">Loading...</div>';
        return;
      }
      let html = '';
      if (state.error) html += '<div class="mb-6 rounded-lg bg-red-50 p-4 text-red-700">' + state.error + '</div>';
      if (state.result) {
        const md = state.result.markdownContent || '';
        const draftHtml = typeof marked !== 'undefined' ? marked.parse(md || '_No draft content available._') : (md || '_No draft content available._').replace(/\n/g, '<br>');
        html += '<div class="space-y-6 rounded-xl border border-emerald-200 bg-white p-6 shadow-sm">';
        html += '<h2 class="text-lg font-semibold text-emerald-800 no-print">Draft generated</h2>';
        html += '<div class="flex flex-wrap gap-2 no-print"><button type="button" onclick="window.print()" class="rounded bg-slate-700 px-3 py-1.5 text-sm text-white hover:bg-slate-600">Save as PDF</button><button type="button" onclick="downloadDocx()" class="rounded bg-slate-700 px-3 py-1.5 text-sm text-white hover:bg-slate-600">Download DOCX</button></div>';
        const files = state.artifactUrls || {};
        const names = Object.keys(files);
        if (names.length) {
          html += '<div class="rounded border border-slate-200 bg-white p-3 no-print"><div class="mb-2 text-sm font-medium text-slate-700">Generated documents</div><div class="flex flex-wrap gap-2">';
          names.filter(n => n.endsWith('.md') || n.endsWith('.csv') || n.endsWith('.json')).forEach(n => {
            const url = files[n];
            if (typeof url === 'string') html += '<a class="rounded border border-slate-300 px-2 py-1 text-xs hover:bg-slate-50" target="_blank" href="' + url + '">' + n + '</a>';
          });
          html += '</div></div>';
        }
        html += '<div class="rounded-lg border border-slate-200 bg-slate-50 p-6 max-h-[60vh] overflow-y-auto prose prose-slate max-w-none" id="draft-preview">' + draftHtml + '</div>';
        html += '<button onclick="state.flowStep=0;state.result=null;state.artifactUrls=null;state.selectedCohort=\'\';state.selectedEquipment=null;state.vmodelCatalog={urs:[],frs:[],trs:[]};state.vmodelSelection={ursIds:[],frsIds:[],trsIds:[]};state.ui={ursQuery:\'\',frsQuery:\'\',trsQuery:\'\',showAdvancedURS:false,showAdvancedFRS:false,showAdvancedTRS:false};render()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300 no-print">Create another</button>';
        html += '</div>';
      } else {
        html += renderProgressBar();
        html += renderStepContent();
      }
      c.innerHTML = html;
    }

    loadBootstrap();
  </script>
</body>
</html>
