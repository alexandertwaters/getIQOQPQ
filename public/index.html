<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IQ/OQ/PQ Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>@media print{.no-print{display:none !important}#draft-preview{max-height:none !important}}</style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <div id="app" class="mx-auto max-w-2xl px-4 py-12">
    <div class="mb-10 no-print">
      <h1 class="text-2xl font-bold text-slate-800">IQ/OQ/PQ Generator</h1>
      <p class="mt-1 text-slate-500">Create advisory qualification packages</p>
    </div>
    <div id="content">Loading...</div>
  </div>
  <script>
    const API = '/api/v1';
    let state = {
      step: 1,
      cohorts: [],
      hazards: [],
      loading: true,
      error: null,
      expandedHelp: null,
      selectedCohort: '',
      selectedEquipment: null,
      equipmentId: '',
      siteContext: { cleanroomClass: 'ISO 7', utilities: [], productContact: true, productionThroughput: 'Medium' },
      equipmentControls: {},
      equipmentControlsCatalog: null,
      hazardContextOptions: null,
      hazardRatings: {},
      catalog: { hazcatVersion: 'hazcat_v1.1', rulesetId: 'ruleset_v1.1' },
      siteContextMetadata: { cleanroomClasses: [], productContact: {}, productionThroughput: [] },
      equipmentMetadata: null,
      generating: false,
      result: null,
      artifactUrls: null,
    };

    async function fetchJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + url);
      return r.json();
    }

    async function load() {
      try {
        const [equip, cat, siteCtx] = await Promise.all([
          fetchJson(API + '/equipment-types'),
          fetchJson(API + '/catalog/version').catch(() => state.catalog),
          fetchJson(API + '/site-context').catch(() => ({ cleanroomClasses: [], productContact: {}, productionThroughput: [] })),
        ]);
        state.cohorts = equip.cohorts || [];
        state.catalog = { ...state.catalog, ...cat };
        state.siteContextMetadata = { cleanroomClasses: siteCtx.cleanroomClasses || [], productContact: siteCtx.productContact || {}, productionThroughput: siteCtx.productionThroughput || [] };
        if (state.siteContextMetadata.cleanroomClasses.length) state.siteContext.cleanroomClass = state.siteContextMetadata.cleanroomClasses.find(c => c.value === 'ISO 7') ? 'ISO 7' : state.siteContextMetadata.cleanroomClasses[0]?.value || 'ISO 7';
        if (state.siteContextMetadata.productionThroughput.length) state.siteContext.productionThroughput = state.siteContextMetadata.productionThroughput.find(t => t.value === 'Medium') ? 'Medium' : state.siteContextMetadata.productionThroughput[0]?.value || 'Medium';
      } catch (e) {
        state.error = e.message;
      }
      state.loading = false;
      render();
    }

    async function loadEquipmentMetadata(equipmentTypeId) {
      try {
        const [metaRes, ctrlRes] = await Promise.all([
          fetchJson(API + '/equipment-metadata?equipmentTypeId=' + equipmentTypeId),
          fetchJson(API + '/equipment-controls?equipmentTypeId=' + equipmentTypeId).catch(() => null),
        ]);
        state.equipmentMetadata = metaRes;
        const em = metaRes.equipmentMetadata;
        if (em?.defaultUtilities?.length) state.siteContext.utilities = [...em.defaultUtilities];
        else state.siteContext.utilities = state.siteContext.utilities.length ? state.siteContext.utilities : ['Electricity'];
        state.equipmentControlsCatalog = ctrlRes;
        state.equipmentControls = {};
        (ctrlRes?.controlCategories || []).forEach(cat => {
          (cat.controls || []).forEach(ctrl => {
            if (ctrl.valueType === 'boolean') state.equipmentControls[ctrl.controlId] = false;
            else if (ctrl.valueType === 'choice' && ctrl.options?.length) state.equipmentControls[ctrl.controlId] = '';
          });
        });
      } catch (e) {
        state.equipmentMetadata = null;
        state.equipmentControlsCatalog = null;
        state.equipmentControls = {};
        if (!state.siteContext.utilities.length) state.siteContext.utilities = ['Electricity'];
      }
      render();
    }

    function setEquipmentControl(controlId, value) {
      state.equipmentControls[controlId] = value;
      render();
    }

    async function loadHazards() {
      if (!state.selectedEquipment) return;
      state.equipmentMetadata = null;
      await loadEquipmentMetadata(state.selectedEquipment.id);
      const [hazRes, ctxRes] = await Promise.all([
        fetchJson(API + '/hazards?equipmentTypeId=' + state.selectedEquipment.id),
        fetchJson(API + '/hazard-context-options?equipmentTypeId=' + state.selectedEquipment.id).catch(() => ({ hazardContextOptions: [] })),
      ]);
      state.hazards = hazRes.hazards || [];
      state.hazardContextOptions = ctxRes.hazardContextOptions || [];
      state.hazardRatings = {};
      state.hazards.forEach(h => {
        const q = h.quickDefaults || {};
        const ctxForHazard = (state.hazardContextOptions || []).find(ho => ho.hazardId === h.hazardId);
        const hazardContext = {};
        (ctxForHazard?.contextOptions || []).forEach(opt => {
          if (opt.valueType === 'boolean') hazardContext[opt.contextId] = false;
          else if (opt.valueType === 'choice') hazardContext[opt.contextId] = '';
          else if (opt.valueType === 'multiSelect') hazardContext[opt.contextId] = [];
        });
        state.hazardRatings[h.hazardId] = {
          Severity_label: q.defaultSeverity || '',
          ProbabilityOfOccurrence_label: q.defaultProbability || '',
          Exposure_label: q.defaultExposure || '',
          Detectability_label: q.defaultDetectability || '',
          ControlEffectiveness_label: q.defaultControlEffectiveness || '',
          hazardContext,
        };
      });
      render();
    }

    function setHazardContext(hazardId, contextId, value) {
      const r = state.hazardRatings[hazardId] || {};
      if (!r.hazardContext) r.hazardContext = {};
      r.hazardContext[contextId] = value;
      state.hazardRatings[hazardId] = { ...r };
      render();
    }

    function toggleHazardContextMulti(hazardId, contextId, value) {
      const r = state.hazardRatings[hazardId] || {};
      if (!r.hazardContext) r.hazardContext = {};
      const arr = r.hazardContext[contextId] || [];
      const i = arr.indexOf(value);
      if (i >= 0) arr.splice(i, 1);
      else arr.push(value);
      r.hazardContext[contextId] = arr;
      state.hazardRatings[hazardId] = { ...r };
      render();
    }

    function toggleUtility(u) {
      const i = state.siteContext.utilities.indexOf(u);
      if (i >= 0) state.siteContext.utilities = state.siteContext.utilities.filter(x => x !== u);
      else state.siteContext.utilities = [...state.siteContext.utilities, u];
      render();
    }

    function setHazardRating(hazardId, field, value) {
      state.hazardRatings[hazardId] = state.hazardRatings[hazardId] || {};
      state.hazardRatings[hazardId][field] = value;
      render();
    }

    function toggleHelp(hazardId, field) {
      const key = hazardId + '.' + field;
      state.expandedHelp = state.expandedHelp === key ? null : key;
      render();
    }

    async function downloadDocx() {
      const md = state.result?.markdownContent;
      if (!md) return;
      try {
        const r = await fetch(API + '/draft-docx', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ markdownContent: md }) });
        if (!r.ok) throw new Error('Failed to generate DOCX');
        const blob = await r.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'qualification-draft.docx';
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) {
        state.error = e.message;
        render();
      }
    }

    function canGenerate() {
      if (!state.selectedEquipment || !state.catalog.rulesetId || !state.catalog.hazcatVersion) return false;
      for (const h of state.hazards) {
        const r = state.hazardRatings[h.hazardId];
        if (!r?.Severity_label || !r?.ProbabilityOfOccurrence_label || !r?.Exposure_label || !r?.Detectability_label || !r?.ControlEffectiveness_label) return false;
      }
      return true;
    }

    async function handleGenerate() {
      if (!canGenerate() || !state.selectedEquipment) return;
      state.generating = true;
      state.error = null;
      render();
      try {
        const payload = {
          equipmentId: state.equipmentId || 'E-' + state.selectedEquipment.id + '-001',
          cohort: state.selectedCohort,
          type: state.selectedEquipment.name,
          siteContext: state.siteContext,
          controlArchitecture: 'PLC or SCADA',
          hazards: state.hazards.map(h => {
            const r = state.hazardRatings[h.hazardId] || {};
            const hc = r.hazardContext || {};
            const hcFiltered = Object.keys(hc).reduce((o, k) => {
              const v = hc[k];
              if (v !== '' && v !== false && !(Array.isArray(v) && v.length === 0)) o[k] = v;
              return o;
            }, {});
            return {
              hazardId: h.hazardId,
              title: h.title,
              definition: h.definition,
              hazardContext: Object.keys(hcFiltered).length ? hcFiltered : undefined,
              ruleId: h.ruleId || '',
              ...r,
            };
          }),
          rulesetId: state.catalog.rulesetId,
          hazcatVersion: state.catalog.hazcatVersion,
        };
        const ec = state.equipmentControls || {};
        const ecFiltered = Object.keys(ec).reduce((o, k) => {
          const v = ec[k];
          if (v !== '' && v !== false) o[k] = v;
          return o;
        }, {});
        if (Object.keys(ecFiltered).length) payload.equipmentControls = ecFiltered;
        const res = await fetch(API + '/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'HTTP ' + res.status);
        }
        const data = await res.json();
        state.result = data;
        const artRes = await fetch(API + '/artifact?fingerprint=' + encodeURIComponent(data.fingerprint));
        const artData = await artRes.json();
        state.artifactUrls = artData.files || {};
        state.step = 5;
      } catch (e) {
        state.error = e.message;
      }
      state.generating = false;
      render();
    }

    function render() {
      const c = document.getElementById('content');
      if (state.loading) {
        c.innerHTML = '<div class="flex min-h-[200px] items-center justify-center text-slate-500">Loading...</div>';
        return;
      }

      let html = '';
      if (state.error) html += '<div class="mb-6 rounded-lg bg-red-50 p-4 text-red-700">' + state.error + '</div>';

      html += '<div class="mb-8 flex gap-2 no-print">';
      [1,2,3,4].forEach(s => {
        const label = s===1?'Equipment':s===2?'Site':s===3?'Hazards':'Review';
        const cls = state.step===s ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-600 hover:bg-slate-300';
        html += '<button onclick="state.step='+s+';render()" class="rounded px-3 py-1 text-sm font-medium '+cls+'">'+label+'</button>';
      });
      html += '</div>';

      if (state.step === 1) {
        html += '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="text-lg font-semibold">Select equipment</h2>';
        state.cohorts.forEach(co => {
          html += '<div><label class="block text-sm font-medium text-slate-600">'+co.cohortId+'</label><div class="mt-2 flex flex-wrap gap-2">';
          co.equipmentTypes.forEach(et => {
            html += '<button onclick="state.selectedCohort=\''+co.cohortId+'\';state.selectedEquipment={id:\''+et.equipmentTypeId+'\',name:\''+et.equipmentType.replace(/'/g,"\\'")+'\'};loadHazards();state.step=2;render()" class="rounded-lg border border-slate-200 px-4 py-2 text-left text-sm hover:border-slate-400 hover:bg-slate-50">'+et.equipmentType+'</button>';
          });
          html += '</div></div>';
        });
        html += '</div>';
      }

      if (state.step === 2 && state.selectedEquipment) {
        const sc = state.siteContext;
        html += '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">';
        html += '<h2 class="text-lg font-semibold">Site context</h2><p class="text-sm text-slate-500">Equipment: '+state.selectedEquipment.name+'</p>';
        html += '<div><label class="block text-sm font-medium">Equipment ID</label><input type="text" value="'+state.equipmentId+'" onchange="state.equipmentId=this.value" placeholder="e.g. E-STER-PV-001" class="mt-1 w-full rounded border border-slate-200 px-3 py-2"></div>';
        const cleanroomOpts = state.siteContextMetadata.cleanroomClasses.length ? state.siteContextMetadata.cleanroomClasses : [{value:'ISO 5',label:'ISO 5'},{value:'ISO 6',label:'ISO 6'},{value:'ISO 7',label:'ISO 7'},{value:'ISO 8',label:'ISO 8'}];
        html += '<div><label class="block text-sm font-medium">Cleanroom class</label>';
        if (cleanroomOpts[0]?.help) html += '<p class="text-xs text-slate-500 mt-0.5">ISO 14644-1 classification for the area where this equipment operates.</p>';
        html += '<select onchange="state.siteContext.cleanroomClass=this.value;render()" class="mt-1 w-full rounded border border-slate-200 px-3 py-2">';
        cleanroomOpts.forEach(o => { const v = o.value||o; const lab = o.label||o; html += '<option value="'+v+'"'+(sc.cleanroomClass===v?' selected':'')+'>'+lab+'</option>'; });
        html += '</select>';
        const selCleanroom = cleanroomOpts.find(o=>(o.value||o)===sc.cleanroomClass);
        if (selCleanroom?.help) html += '<p class="mt-1 text-xs text-slate-600">'+selCleanroom.help.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</p>';
        html += '</div>';
        const em = state.equipmentMetadata?.equipmentMetadata || state.equipmentMetadata;
        const utilList = em?.defaultUtilities?.length ? em.defaultUtilities : ['Steam','Electricity','Compressed Air','WFI','Nitrogen'];
        const utilDesc = em?.utilityDescriptors || {};
        const utilMaster = state.equipmentMetadata?.utilitiesMasterList || {};
        html += '<div><label class="block text-sm font-medium">Utilities</label><p class="text-xs text-slate-500 mt-0.5">Select utilities that supply this equipment. Filtered for this equipment type.</p><div class="mt-2 flex flex-wrap gap-2">';
        utilList.forEach(u => {
          const checked = sc.utilities.includes(u);
          const desc = utilDesc[u] || utilMaster[u] || '';
          html += '<label class="flex cursor-pointer items-center gap-2 rounded border px-3 py-2 hover:bg-slate-50 '+(checked?'border-emerald-500 bg-emerald-50/50':'border-slate-200')+'" title="'+desc.replace(/"/g,'&quot;').replace(/'/g,'&#39;')+'"><input type="checkbox" '+(checked?'checked':'')+' onchange="toggleUtility(\''+u.replace(/'/g,"\\'")+'\')"><span class="text-sm">'+u+'</span>';
          if (desc) html += '<span class="text-slate-400 cursor-help" title="'+desc.replace(/"/g,'&quot;').replace(/'/g,'&#39;')+'">ⓘ</span>';
          html += '</label>';
        });
        html += '</div></div>';
        const pcHelp = state.siteContextMetadata.productContact?.help || '';
        html += '<div><label class="flex cursor-pointer items-center gap-2"><input type="checkbox" '+(sc.productContact?'checked':'')+' onchange="state.siteContext.productContact=this.checked;render()"> Product contact</label>';
        if (pcHelp) html += '<p class="ml-6 mt-0.5 text-xs text-slate-600" title="'+pcHelp.replace(/"/g,'&quot;').replace(/'/g,'&#39;')+'">'+pcHelp.replace(/</g,'&lt;').replace(/>/g,'&gt;').slice(0,180)+(pcHelp.length>180?'... Hover for full text.':'')+'</p>';
        html += '</div>';
        const catalog = state.equipmentControlsCatalog;
        if (catalog && catalog.controlCategories && catalog.controlCategories.length > 0) {
          html += '<div class="rounded-lg border border-slate-200 bg-slate-50/50 p-4"><h3 class="text-sm font-semibold text-slate-700">Equipment controls</h3><p class="mt-0.5 text-xs text-slate-500">Select controls present at your site/equipment. Affects risk assessment and qualification scope.</p>';
          catalog.controlCategories.forEach(cat => {
            html += '<div class="mt-4"><div class="text-xs font-medium text-slate-600">'+cat.label+'</div>';
            (cat.controls || []).forEach(ctrl => {
              const cid = ctrl.controlId; const val = state.equipmentControls[cid];
              const esc = (s)=>String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
              if (ctrl.valueType === 'boolean') {
                html += '<label class="mt-1 flex cursor-pointer items-center gap-2 text-sm"><input type="checkbox" '+(val?'checked':'')+' onchange="setEquipmentControl(\''+esc(cid)+'\',this.checked)"> '+ctrl.label+'</label>';
                if (ctrl.help) html += '<p class="ml-5 text-xs text-slate-500">'+esc(ctrl.help).replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</p>';
              } else if (ctrl.valueType === 'choice' && ctrl.options && ctrl.options.length) {
                html += '<div class="mt-1"><label class="text-xs text-slate-500">'+ctrl.label+'</label>';
                html += '<select onchange="setEquipmentControl(\''+esc(cid)+'\',this.value)" class="mt-0.5 block w-full max-w-xs rounded border border-slate-200 px-2 py-1.5 text-sm">';
                html += '<option value="">Select...</option>';
                ctrl.options.forEach(o => { html += '<option value="'+esc(o.value)+'"'+(val===o.value?' selected':'')+'>'+(o.label||o.value)+'</option>'; });
                html += '</select></div>';
              }
            });
            html += '</div>';
          });
          html += '</div>';
        }
        const throughputOpts = state.siteContextMetadata.productionThroughput.length ? state.siteContextMetadata.productionThroughput : [{value:'Low',label:'Low'},{value:'Medium',label:'Medium'},{value:'High',label:'High'}];
        html += '<div><label class="block text-sm font-medium">Production throughput</label><select onchange="state.siteContext.productionThroughput=this.value;render()" class="mt-1 w-full rounded border border-slate-200 px-3 py-2">';
        throughputOpts.forEach(o => { const v = o.value||o; const lab = o.label||o; html += '<option value="'+v+'"'+(sc.productionThroughput===v?' selected':'')+'>'+lab+'</option>'; });
        html += '</select>';
        const selThroughput = throughputOpts.find(o=>(o.value||o)===sc.productionThroughput);
        if (selThroughput?.help) html += '<p class="mt-1 text-xs text-slate-600">'+selThroughput.help.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</p>';
        html += '</div>';
        html += '<div class="flex gap-2"><button onclick="state.step=1;render()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300">Back</button>';
        html += '<button onclick="state.step=3;render()" class="rounded bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Next</button></div></div>';
      }

      if (state.step === 3 && state.selectedEquipment) {
        html += '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="text-lg font-semibold">Configure hazards</h2>';
        if (state.hazards.length === 0) html += '<p class="text-slate-500">Loading hazards...</p>';
        state.hazards.forEach(h => {
          const r = state.hazardRatings[h.hazardId] || {};
          html += '<div class="rounded-lg border border-slate-200 bg-slate-50 p-4"><h3 class="font-medium">'+h.title+'</h3><p class="mt-1 text-sm text-slate-600">'+h.definition+'</p>';
          const fields = [
            {key:'Severity_label',l:'Severity',opts:h.severityOptions||[]},
            {key:'ProbabilityOfOccurrence_label',l:'Probability',opts:h.probabilityOptions||[]},
            {key:'Exposure_label',l:'Exposure',opts:h.exposureOptions||[]},
            {key:'Detectability_label',l:'Detectability',opts:h.detectabilityOptions||[]},
            {key:'ControlEffectiveness_label',l:'Control effectiveness',opts:h.controlEffectivenessOptions||[]},
          ];
          fields.forEach(({key,l,opts}) => {
            const sel = r[key]||'';
            const selOpt = opts.find(o=>(o.label||o)===sel);
            html += '<div class="mt-3"><div class="flex items-center gap-2"><label class="block text-xs font-medium text-slate-500">'+l+'</label>';
            html += '<select onchange="setHazardRating(\''+h.hazardId.replace(/'/g,"\\'")+'\',\''+key+'\',this.value)" class="flex-1 rounded border border-slate-200 px-2 py-1.5 text-sm">';
            html += '<option value="">Select...</option>';
            (opts||[]).forEach(o => { const lab = o.label||o; html += '<option value="'+lab.replace(/"/g,'&quot;')+'"'+(sel===lab?' selected':'')+'>'+lab+'</option>'; });
            html += '</select>';
            if (selOpt && (selOpt.help||selOpt.example)) {
              const isExp = state.expandedHelp === h.hazardId+'.'+key;
              const info = (selOpt.help||'') + (selOpt.example ? ' Example: ' + selOpt.example : '');
              html += '<button type="button" title="Show help" class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full '+(isExp?'bg-slate-500 text-white':'bg-slate-300 text-slate-600 hover:bg-slate-400')+' text-xs font-bold" onclick="toggleHelp(\''+h.hazardId.replace(/'/g,"\\'")+'\',\''+key.replace(/'/g,"\\'")+'\')">i</button>';
              if (isExp) html += '<div class="mt-1 w-full rounded bg-slate-100 px-2 py-1.5 text-xs text-slate-700">'+info.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
            }
            html += '</div></div>';
          });
          const ctxForHazard = (state.hazardContextOptions || []).find(ho => ho.hazardId === h.hazardId);
          if (ctxForHazard && ctxForHazard.contextOptions && ctxForHazard.contextOptions.length > 0) {
            html += '<div class="mt-3 rounded border border-slate-200 bg-white p-2"><label class="block text-xs font-medium text-slate-500">Hazard context</label><p class="text-xs text-slate-500 mt-0.5">Describe load/configuration for this hazard.</p>';
            ctxForHazard.contextOptions.forEach(opt => {
              const cid = opt.contextId; const val = (r.hazardContext || {})[cid];
              const esc = (s)=>String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
              if (opt.valueType === 'boolean') {
                html += '<label class="mt-1 flex cursor-pointer items-center gap-2 text-xs"><input type="checkbox" '+(val?'checked':'')+' onchange="setHazardContext(\''+esc(h.hazardId)+'\',\''+esc(cid)+'\',this.checked)"> '+opt.label+'</label>';
              } else if (opt.valueType === 'choice' && opt.options && opt.options.length) {
                html += '<div class="mt-1"><label class="text-xs text-slate-500">'+opt.label+'</label>';
                html += '<select onchange="setHazardContext(\''+esc(h.hazardId)+'\',\''+esc(cid)+'\',this.value)" class="mt-0.5 block w-full max-w-xs rounded border border-slate-200 px-2 py-1 text-xs">';
                html += '<option value="">Select...</option>';
                opt.options.forEach(o => { html += '<option value="'+esc(o.value)+'"'+(val===o.value?' selected':'')+'>'+(o.label||o.value)+'</option>'; });
                html += '</select></div>';
              } else if (opt.valueType === 'multiSelect' && opt.options && opt.options.length) {
                html += '<div class="mt-1"><label class="text-xs text-slate-500">'+opt.label+'</label><div class="mt-0.5 flex flex-wrap gap-1">';
                const selArr = Array.isArray(val) ? val : [];
                opt.options.forEach(o => {
                  const ch = selArr.includes(o.value);
                  html += '<label class="inline-flex cursor-pointer items-center gap-1 rounded border px-2 py-0.5 text-xs '+(ch?'border-emerald-500 bg-emerald-50':'border-slate-200')+'"><input type="checkbox" '+(ch?'checked':'')+' onchange="toggleHazardContextMulti(\''+esc(h.hazardId)+'\',\''+esc(cid)+'\',\''+esc(o.value)+'\')"> '+(o.label||o.value)+'</label>';
                });
                html += '</div></div>';
              }
            });
            html += '</div>';
          }
          html += '</div></div>';
        });
        html += '<div class="flex gap-2"><button onclick="state.step=2;render()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300">Back</button>';
        html += '<button onclick="state.step=4;render()" class="rounded bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Next</button></div></div>';
      }

      if (state.step === 4 && state.selectedEquipment) {
        const sc = state.siteContext;
        html += '<div class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">';
        html += '<h2 class="text-lg font-semibold">Review and generate draft</h2>';
        html += '<dl class="space-y-1 text-sm"><dt class="font-medium text-slate-500">Equipment</dt><dd>'+state.selectedEquipment.name+'</dd>';
        html += '<dt class="mt-2 font-medium text-slate-500">Site</dt><dd>'+sc.cleanroomClass+', '+sc.utilities.join(', ')+', Product contact: '+(sc.productContact?'Yes':'No')+', Throughput: '+sc.productionThroughput+'</dd>';
        const ec = state.equipmentControls || {};
        const ecSet = Object.entries(ec).filter(([,v]) => v !== '' && v !== false).length;
        if (ecSet) html += '<dt class="mt-2 font-medium text-slate-500">Equipment controls</dt><dd>'+ecSet+' selected</dd>';
        html += '<dt class="mt-2 font-medium text-slate-500">Hazards configured</dt><dd>'+state.hazards.length+'</dd></dl>';
        html += '<div class="space-y-4"><h3 class="text-sm font-medium text-slate-600">Per-hazard summary</h3>';
        state.hazards.forEach(h => {
          const r = state.hazardRatings[h.hazardId] || {};
          const fields = [
            {key:'Severity_label',l:'Severity',opts:h.severityOptions||[]},
            {key:'ProbabilityOfOccurrence_label',l:'Probability',opts:h.probabilityOptions||[]},
            {key:'Exposure_label',l:'Exposure',opts:h.exposureOptions||[]},
            {key:'Detectability_label',l:'Detectability',opts:h.detectabilityOptions||[]},
            {key:'ControlEffectiveness_label',l:'Control effectiveness',opts:h.controlEffectivenessOptions||[]},
          ];
          html += '<div class="rounded-lg border border-slate-200 bg-slate-50 p-4"><div class="font-medium text-sm text-slate-800">'+h.title+'</div>';
          html += '<p class="mt-0.5 text-xs text-slate-600">'+h.definition.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</p>';
          fields.forEach(({key,l,opts}) => {
            const sel = r[key]||'';
            const selOpt = opts.find(o=>(o.label||o)===sel);
            const desc = selOpt ? ((selOpt.help||'')+(selOpt.example?' Example: '+selOpt.example:'')) : '';
            html += '<div class="mt-2 text-xs"><span class="font-medium text-slate-600">'+l+':</span> <span class="text-slate-800">'+(sel||'—')+'</span>'+(desc?' <span class="block mt-0.5 text-slate-500 pl-2 border-l-2 border-slate-200">'+desc.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span>':'')+'</div>';
          });
          const hc = r.hazardContext || {};
          const hcEntries = Object.entries(hc).filter(([,v]) => v !== '' && v !== false && !(Array.isArray(v) && v.length === 0));
          if (hcEntries.length) html += '<div class="mt-2 text-xs"><span class="font-medium text-slate-600">Hazard context:</span> <span class="text-slate-800">'+hcEntries.map(([k,v])=>k+': '+(Array.isArray(v)?v.join(', '):v)).join('; ')+'</span></div>';
          if (h.ruleId) html += '<div class="mt-1 text-xs text-slate-500">Rule: '+h.ruleId+'</div>';
          if (h.standards && h.standards.length) html += '<div class="mt-0.5 text-xs text-slate-500">Standards: '+h.standards.join(', ')+'</div>';
          html += '</div>';
        });
        html += '</div>';
        html += '<div class="flex gap-2"><button onclick="state.step=3;render()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300">Back</button>';
        html += '<button onclick="handleGenerate()" '+(canGenerate()&&!state.generating?'':'disabled')+' class="rounded bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700 disabled:opacity-50">'+(state.generating?'Generating...':'Generate Draft')+'</button></div></div>';
      }

      if (state.step === 5 && state.result) {
        const md = state.result.markdownContent || '';
        const draftHtml = typeof marked !== 'undefined' ? marked.parse(md || '_No draft content available._') : (md || '_No draft content available._').replace(/\n/g,'<br>');
        html += '<div class="space-y-6 rounded-xl border border-emerald-200 bg-white p-6 shadow-sm">';
        html += '<h2 class="text-lg font-semibold text-emerald-800 no-print">Draft generated</h2>';
        html += '<div class="flex flex-wrap gap-2 no-print">';
        if (state.artifactUrls) {
          Object.entries(state.artifactUrls).forEach(([name, url]) => {
            if (typeof url === 'string' && !url.includes('error'))
              html += '<a href="'+url+'" download target="_blank" rel="noopener noreferrer" class="rounded bg-slate-700 px-3 py-1.5 text-sm text-white hover:bg-slate-600">Download '+(name.endsWith('.md')?'Markdown':name.endsWith('.json')?'JSON':'CSV')+'</a>';
          });
        }
        html += '<button type="button" onclick="window.print()" class="rounded bg-slate-700 px-3 py-1.5 text-sm text-white hover:bg-slate-600">Save as PDF</button>';
        html += '<button type="button" onclick="downloadDocx()" class="rounded bg-slate-700 px-3 py-1.5 text-sm text-white hover:bg-slate-600">Download DOCX</button>';
        html += '</div>';
        html += '<div class="rounded-lg border border-slate-200 bg-slate-50 p-6 max-h-[60vh] overflow-y-auto prose prose-slate prose-sm max-w-none" id="draft-preview">'+draftHtml+'</div>';
        html += '<button onclick="state.step=1;state.result=null;state.artifactUrls=null;render()" class="rounded bg-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-300 no-print">Create another</button></div>';
      }

      c.innerHTML = html;
    }

    load();
  </script>
</body>
</html>
